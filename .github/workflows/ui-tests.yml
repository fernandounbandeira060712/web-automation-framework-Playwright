name: UI Automation Quality Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Tests and Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Generate Dependency Check Cache Key
        id: dependency-cache-key
        shell: bash
        run: |
          WEEK="$(date +'%G-%V')"

          echo "week=${WEEK}" >> "$GITHUB_OUTPUT"
          echo "Dependency-Check cache period: ${WEEK}"

      - name: Restore Dependency Check Database
        id: dependency-check-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-v3-12.2.2-${{ steps.dependency-cache-key.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-v3-12.2.2-
            ${{ runner.os }}-dependency-check-v3-

      - name: Inspect Dependency Check Cache
        id: dependency-database
        shell: bash
        run: |
          DATA_DIRECTORY="$HOME/.m2/repository/org/owasp/dependency-check-data"

          echo "Exact cache hit: ${{ steps.dependency-check-cache.outputs.cache-hit }}"

          if [ -d "$DATA_DIRECTORY" ] &&
             find "$DATA_DIRECTORY" -type f -size +0c | grep -q .; then

            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Dependency-Check database files were restored."

            du -sh "$DATA_DIRECTORY" || true
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No usable Dependency-Check database was restored."
          fi

      - name: Application Health Check
        id: application-health-check
        shell: bash
        run: |
          APPLICATION_URL="https://automationexercise.com/"

          echo "Checking application availability: ${APPLICATION_URL}"

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              --connect-timeout 15 \
              --max-time 60 \
              --user-agent "Mozilla/5.0 GitHub-Actions-Health-Check" \
              "${APPLICATION_URL}"
          )"

          echo "Application HTTP status: ${HTTP_STATUS}"

          if [[ "$HTTP_STATUS" =~ ^[23][0-9]{2}$ ]]; then
            echo "Application is reachable."
            exit 0
          fi

          echo "::error::Application health check failed with HTTP status ${HTTP_STATUS}."
          exit 1

      - name: Install Playwright Browsers
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          exec:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps"

      - name: Execute UI Tests
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          clean test

      - name: Generate JaCoCo Coverage Report
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          jacoco:report

      - name: Verify JaCoCo Coverage Report
        shell: bash
        run: |
          test -f target/site/jacoco/jacoco.xml
          test -f target/site/jacoco/index.html

          echo "JaCoCo coverage report generated successfully."
          ls -la target/site/jacoco

      - name: Static Code Analysis - PMD
        if: always()
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          pmd:check

      - name: Static Code Analysis - SpotBugs
        if: always()
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          spotbugs:check

      - name: Validate SonarQube Cloud Token
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Repository secret SONAR_TOKEN is not configured."
            exit 1
          fi

          echo "SONAR_TOKEN is configured."

      - name: SonarQube Cloud Analysis and Quality Gate
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            test-compile \
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar \
            -Dsonar.organization=fernandounbandeira060712 \
            -Dsonar.projectKey=fernandounbandeira060712_web-automation-framework-Playwright \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

      - name: Validate NVD API Key
        if: always()
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        shell: bash
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::Repository secret NVD_API_KEY is not configured."
            exit 1
          fi

          echo "NVD API Key is configured."

      - name: Update Dependency Check Database
        id: dependency-update
        if: >
          always() &&
          steps.dependency-check-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        shell: bash
        run: |
          MAX_ATTEMPTS=3
          ATTEMPT=1

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "Dependency-Check database update attempt ${ATTEMPT}/${MAX_ATTEMPTS}."

            if mvn \
              --batch-mode \
              --no-transfer-progress \
              dependency-check:update-only; then

              echo "Dependency-Check database updated successfully."
              exit 0
            fi

            if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
              WAIT_SECONDS=$((ATTEMPT * 60))

              echo "::warning::NVD update failed."
              echo "Waiting ${WAIT_SECONDS} seconds before retrying."

              sleep "$WAIT_SECONDS"
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "::error::NVD update failed after ${MAX_ATTEMPTS} attempts."
          exit 1

      - name: Validate Dependency Check Database Availability
        if: always()
        shell: bash
        run: |
          UPDATE_OUTCOME="${{ steps.dependency-update.outcome }}"
          CACHE_AVAILABLE="${{ steps.dependency-database.outputs.available }}"
          EXACT_CACHE_HIT="${{ steps.dependency-check-cache.outputs.cache-hit }}"

          echo "Update outcome: ${UPDATE_OUTCOME}"
          echo "Existing database available: ${CACHE_AVAILABLE}"
          echo "Exact cache hit: ${EXACT_CACHE_HIT}"

          if [ "$EXACT_CACHE_HIT" = "true" ]; then
            echo "Using current cached Dependency-Check database."
            exit 0
          fi

          if [ "$UPDATE_OUTCOME" = "success" ]; then
            echo "Using freshly updated Dependency-Check database."
            exit 0
          fi

          if [ "$CACHE_AVAILABLE" = "true" ]; then
            echo "::warning::NVD is unavailable. Using the previously cached database."
            exit 0
          fi

          echo "::error::No valid Dependency-Check database is available."
          exit 1

      - name: Save Dependency Check Database
        if: >
          always() &&
          steps.dependency-check-cache.outputs.cache-hit != 'true' &&
          steps.dependency-update.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-v3-12.2.2-${{ steps.dependency-cache-key.outputs.week }}

      - name: Dependency Vulnerability Analysis
        if: always()
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        shell: bash
        run: |
          echo "Running dependency scan using the prepared local database."

          mvn \
            --batch-mode \
            --no-transfer-progress \
            dependency-check:check \
            -DautoUpdate=false

      - name: Install Allure CLI
        if: always()
        shell: bash
        run: |
          ALLURE_VERSION="2.29.0"
          ALLURE_ARCHIVE="$RUNNER_TEMP/allure-${ALLURE_VERSION}.tgz"
          ALLURE_DIRECTORY="$RUNNER_TEMP/allure-${ALLURE_VERSION}"

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz" \
            --output "$ALLURE_ARCHIVE"

          tar -xzf "$ALLURE_ARCHIVE" -C "$RUNNER_TEMP"

          echo "${ALLURE_DIRECTORY}/bin" >> "$GITHUB_PATH"

          "${ALLURE_DIRECTORY}/bin/allure" --version

      - name: Generate Allure HTML Report
        if: always()
        shell: bash
        run: |
          mkdir -p target/allure-results

          allure generate \
            target/allure-results \
            --clean \
            --output target/allure-report

      - name: Verify Allure HTML Report
        if: always()
        shell: bash
        run: |
          test -f target/allure-report/index.html

          echo "Allure Report generated successfully."
          ls -la target/allure-report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: target/allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report-${{ github.run_number }}
          path: target/allure-report
          if-no-files-found: error
          retention-days: 14

      - name: Upload Playwright Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence-${{ github.run_number }}
          path: |
            target/traces
            target/videos
            target/surefire-reports
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report-${{ github.run_number }}
          path: target/dependency-check
          if-no-files-found: warn
          retention-days: 30

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report-${{ github.run_number }}
          path: target/site/jacoco
          if-no-files-found: warn
          retention-days: 30

      - name: Setup GitHub Pages
        if: >
          always() &&
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch')
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages Artifact
        if: >
          always() &&
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/allure-report

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write
      packages: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-extended
          build-mode: manual

      - name: Build Project for CodeQL
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          -DskipTests
          test-compile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"

  deploy-pages:
    name: Deploy Allure Report

    needs:
      - quality-gate
      - codeql

    if: >
      always() &&
      needs.quality-gate.result != 'cancelled' &&
      needs.codeql.result != 'cancelled' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch')

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure Report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4