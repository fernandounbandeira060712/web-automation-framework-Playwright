name: UI Automation Quality Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configuration-gate:
    name: Configuration Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Project Configuration
        shell: pwsh
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ./scripts/quality-gates/validate-configuration.ps1 `
            -ProjectRoot . `
            -Environment dev `
            -RequireSecrets

  quality-gate:
    name: Tests and Quality Gates
    needs: configuration-gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Generate Dependency Check Cache Key
        id: dependency-cache-key
        shell: bash
        run: |
          echo "week=$(date +'%G-%V')" >> "$GITHUB_OUTPUT"

      - name: Restore Dependency Check Database
        id: dependency-check-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-v2-${{ steps.dependency-cache-key.outputs.week }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-v2-${{ steps.dependency-cache-key.outputs.week }}-
            ${{ runner.os }}-dependency-check-v2-

      - name: Show Dependency Check Cache Status
        shell: bash
        run: |
          echo "Dependency-Check cache hit: ${{ steps.dependency-check-cache.outputs.cache-hit }}"

      # O health check externo foi removido.
      # O próprio Playwright será responsável por validar a aplicação.
      # Isso evita bloquear toda a pipeline devido a redirects,
      # indisponibilidade temporária ou proteção anti-bot do site público.

      - name: Install Playwright Browsers
        id: install-playwright
        continue-on-error: true
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          exec:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps"

      - name: Execute UI Tests
        id: ui-tests
        if: always()
        continue-on-error: true
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        shell: bash
        run: |
          mvn \
            --batch-mode \
            --no-transfer-progress \
            clean test \
            -Dallure.results.directory="$GITHUB_WORKSPACE/target/allure-results"

      - name: Verify Test and Allure Results
        id: verify-results
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          echo "Checking Surefire reports..."

          if [ -d "target/surefire-reports" ]; then
            SUREFIRE_COUNT="$(find target/surefire-reports -type f | wc -l)"
            echo "Surefire report files found: ${SUREFIRE_COUNT}"
            find target/surefire-reports -maxdepth 2 -type f -print
          else
            echo "::error::The target/surefire-reports directory was not generated."
            exit 1
          fi

          echo "Checking Allure results..."

          if [ ! -d "target/allure-results" ]; then
            echo "::error::The target/allure-results directory was not generated."
            exit 1
          fi

          RESULT_COUNT="$(find target/allure-results -type f | wc -l)"

          echo "Allure result files found: ${RESULT_COUNT}"

          if [ "$RESULT_COUNT" -eq 0 ]; then
            echo "::error::The Allure results directory exists but contains no result files."
            exit 1
          fi

          find target/allure-results -maxdepth 2 -type f -print

      - name: Static Code Analysis - PMD
        id: pmd
        if: always()
        continue-on-error: true
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          pmd:check

      - name: Static Code Analysis - SpotBugs
        id: spotbugs
        if: always()
        continue-on-error: true
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          spotbugs:check

      - name: Update Dependency Check Database
        id: dependency-check-update
        if: >
          always() &&
          steps.dependency-check-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        shell: bash
        run: |
          echo "No valid cache found."
          echo "Downloading and rebuilding the NVD database."

          mvn \
            --batch-mode \
            --no-transfer-progress \
            dependency-check:update-only

      - name: Save Dependency Check Database
        if: >
          always() &&
          steps.dependency-check-update.outcome == 'success' &&
          steps.dependency-check-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-v2-${{ steps.dependency-cache-key.outputs.week }}-${{ hashFiles('pom.xml') }}

      - name: Dependency Vulnerability Analysis
        id: dependency-check
        if: always()
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        shell: bash
        run: |
          echo "Running dependency vulnerability analysis."

          mvn \
            --batch-mode \
            --no-transfer-progress \
            dependency-check:check

      - name: Install Allure CLI
        id: install-allure
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          ALLURE_VERSION="2.29.0"
          ALLURE_ARCHIVE="$RUNNER_TEMP/allure-${ALLURE_VERSION}.tgz"
          ALLURE_DIRECTORY="$RUNNER_TEMP/allure-${ALLURE_VERSION}"

          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz" \
            --output "$ALLURE_ARCHIVE"

          tar -xzf "$ALLURE_ARCHIVE" -C "$RUNNER_TEMP"

          echo "${ALLURE_DIRECTORY}/bin" >> "$GITHUB_PATH"

          "${ALLURE_DIRECTORY}/bin/allure" --version

      - name: Generate Allure HTML Report
        id: generate-allure
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          if [ ! -d "target/allure-results" ] ||
             [ -z "$(find target/allure-results -type f -print -quit)" ]; then
            echo "::warning::No Allure result files were generated."
            exit 0
          fi

          allure generate \
            target/allure-results \
            --clean \
            --output target/allure-report

      - name: Verify Allure HTML Report
        id: verify-allure-report
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          if [ ! -f "target/allure-report/index.html" ]; then
            echo "::warning::Allure HTML Report was not generated."
            exit 0
          fi

          echo "Allure Report generated successfully."

          find \
            target/allure-report \
            -maxdepth 2 \
            -type f \
            -print |
            head -50

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: target/allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report-${{ github.run_number }}
          path: target/allure-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence-${{ github.run_number }}
          path: |
            target/traces
            target/videos
            target/screenshots
            target/surefire-reports
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report-${{ github.run_number }}
          path: target/dependency-check
          if-no-files-found: warn
          retention-days: 30

      - name: Setup GitHub Pages
        if: >
          always() &&
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch') &&
          hashFiles('target/allure-report/index.html') != ''
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages Artifact
        if: >
          always() &&
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch') &&
          hashFiles('target/allure-report/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/allure-report

      - name: Enforce Quality Gate
        if: always()
        shell: bash
        env:
          PLAYWRIGHT_INSTALL_OUTCOME: ${{ steps.install-playwright.outcome }}
          UI_TESTS_OUTCOME: ${{ steps.ui-tests.outcome }}
          RESULTS_OUTCOME: ${{ steps.verify-results.outcome }}
          PMD_OUTCOME: ${{ steps.pmd.outcome }}
          SPOTBUGS_OUTCOME: ${{ steps.spotbugs.outcome }}
          DEPENDENCY_CHECK_OUTCOME: ${{ steps.dependency-check.outcome }}
          ALLURE_INSTALL_OUTCOME: ${{ steps.install-allure.outcome }}
          ALLURE_GENERATION_OUTCOME: ${{ steps.generate-allure.outcome }}
        run: |
          echo "=============================================="
          echo "Enterprise Quality Gate Summary"
          echo "=============================================="
          echo "Playwright installation: ${PLAYWRIGHT_INSTALL_OUTCOME}"
          echo "UI tests:               ${UI_TESTS_OUTCOME}"
          echo "Test and Allure results:${RESULTS_OUTCOME}"
          echo "PMD:                    ${PMD_OUTCOME}"
          echo "SpotBugs:               ${SPOTBUGS_OUTCOME}"
          echo "Dependency Check:       ${DEPENDENCY_CHECK_OUTCOME}"
          echo "Allure CLI installation:${ALLURE_INSTALL_OUTCOME}"
          echo "Allure report:          ${ALLURE_GENERATION_OUTCOME}"
          echo "=============================================="

          FAILED=0

          validate_outcome() {
            local name="$1"
            local outcome="$2"

            if [ "$outcome" != "success" ]; then
              echo "::error::${name} failed with outcome: ${outcome}"
              FAILED=1
            fi
          }

          validate_outcome "Playwright installation" "$PLAYWRIGHT_INSTALL_OUTCOME"
          validate_outcome "UI tests" "$UI_TESTS_OUTCOME"
          validate_outcome "Test and Allure result verification" "$RESULTS_OUTCOME"
          validate_outcome "PMD" "$PMD_OUTCOME"
          validate_outcome "SpotBugs" "$SPOTBUGS_OUTCOME"
          validate_outcome "Dependency Check" "$DEPENDENCY_CHECK_OUTCOME"
          validate_outcome "Allure CLI installation" "$ALLURE_INSTALL_OUTCOME"
          validate_outcome "Allure report generation" "$ALLURE_GENERATION_OUTCOME"

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more quality gates failed."
            exit 1
          fi

          echo "All enterprise quality gates passed successfully."

  codeql:
    name: CodeQL Security Analysis
    needs: configuration-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      security-events: write
      packages: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-extended
          build-mode: manual

      - name: Build Project for CodeQL
        run: >
          mvn
          --batch-mode
          --no-transfer-progress
          -DskipTests
          test-compile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"

  deploy-pages:
    name: Deploy Allure Report

    needs:
      - quality-gate
      - codeql

    if: >
      always() &&
      needs.quality-gate.result == 'success' &&
      needs.codeql.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch')

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure Report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4