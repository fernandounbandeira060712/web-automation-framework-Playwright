version: 2

updates:

  # Dependências Maven
  - package-ecosystem: "maven"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Sao_Paulo"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "deps"

    labels:
      - "dependencies"
      - "maven"

    groups:
      maven-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "America/Sao_Paulo"

    open-pull-requests-limit: 3

    commit-message:
      prefix: "ci"

    labels:
      - "dependencies"
      - "github-actions"

    groups:
      github-actions:
        patterns:
          - "*"